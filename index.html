<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      color: #333;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    section {
      margin-bottom: 1.5rem;
    }
    section h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 0.5rem;
    }
    section p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #555;
    }
    a {
      color: #333;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.85rem;
      color: #999;
    }
    footer a {
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <h1>Clarivo</h1>
      <section>
        <h2>About</h2>
        <p>モバイルアプリの企画・開発を行っています。</p>
      </section>
      <section>
        <h2>Contact</h2>
        <p><a href="mailto:kiwi3.dev@gmail.com">kiwi3.dev@gmail.com</a></p>
      </section>
    </div>
  </main>
  <footer>
    &copy; 2026 Clarivo &middot; <a href="/privacy-policy.html">Privacy Policy</a>
  </footer>
</body>
</html>
